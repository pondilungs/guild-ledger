services:
  - type: web
    name: guild-ledger-leaderboard
    runtime: node
    plan: free
    rootDir: services/leaderboard-api
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /leaderboard?limit=1
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_DB_NAME
        value: guild-ledger
      - key: LEADERBOARD_ADMIN_TOKEN
        sync: false